<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just One Question ❤️</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    .container {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
        color: #ff4d6d;
    }

    .buttons {
        position: relative;
        height: 200px;
        margin-top: 20px;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        position: absolute;
    }

    #yesBtn {
        background: #4CAF50;
        color: white;
        left: 120px;
        top: 60px;
    }

    #noBtn {
        background: #f44336;
        color: white;
        left: 260px;
        top: 60px;
        transition: 0.15s;
    }

    #result {
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">
    <h1>❤️ One Honest Question ❤️</h1>
    <p>Do you think I am important to you?</p>

    <div class="buttons">
        <button id="yesBtn" onclick="yesAnswer()">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>

    <div id="result"></div>
</div>

<script>
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    const randomX = Math.floor(Math.random() * maxX);
    const randomY = Math.floor(Math.random() * maxY);

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
});

function yesAnswer() {
    document.getElementById("result").innerHTML =
        "🥰 I knew it! That makes me really happy ❤️";
}
</script>

</body>
</html>
